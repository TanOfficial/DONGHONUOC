<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DONGHONUOC_WEB</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="DONGHONUOC_WEB.styles.css" rel="stylesheet" />
    <script>
        // Global Error Handler - Must be defined before Blazor loads
        window.onerror = function (message, source, lineno, colno, error) {
            console.error('Global Error:', error);
            document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;z-index:9999;padding:20px;overflow:auto;">' +
                '<h1>CRITICAL ERROR</h1>' +
                '<p>' + message + '</p>' +
                '<p>Source: ' + source + ':' + lineno + '</p>' +
                '<p>Stack: ' + (error ? error.stack : 'N/A') + '</p>' +
                '</div>';
            return true; // Prevent default handler
        };
        window.addEventListener('unhandledrejection', function (event) {
            console.error('Unhandled Rejection:', event.reason);
            document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;z-index:9999;padding:20px;overflow:auto;">' +
                '<h1>UNHANDLED REJECTION</h1>' +
                '<p>' + event.reason + '</p>' +
                '</div>';
        });
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
